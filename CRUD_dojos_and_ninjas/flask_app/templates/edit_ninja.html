<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <h1>Edit Ninja</h1>
    <form action="/ninja/edit/process" method="POST">
        <div class="mb-3">
            <label for="first_name">First Name:</label>
            <input type="text" name="first_name" value="{{ninja.first_name}}">
        </div>
        <div class="mb-3">
            <label for="last_name">Last Name:</label>
            <input type="text" name="last_name" value="{{ninja.last_name}}">
        </div>
        <div class="mb-3">
            <label for="email">Age:</label>
            <input type="text" name="email" value="{{ninja.age}}">
        </div>
        <input type="submit" value="Update"> <a href="/dojos/all">Back to Dojos</a>
    </form>  
</body>
</html>
