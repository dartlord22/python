<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <style>
        .row_1{
            display: flex;
            justify-content: space-between;
        }
        .row_2{
            display: flex;
            justify-content: space-between;
        }
        .container{
            border: solid black 2px;
            padding: 10px;
        }
        .btn{
            background-color: rgb(50, 234, 50);
        }
    </style>
    <title>Show Tree</title>
</head>
<body>
    <div class="container row justify-content-center mx-auto mt-2">
        <div class="row_1">
            <h1 style="color: rgb(50, 234, 50);">Arbortrary</h1>
            <h1>Welcome, {{user.first_name}}</h1>
        </div>
        <div class="row_2">
            <p>A site to track randomly planted trees</p>
            <div class="links">
                <a href="/user/account" class="btn btn-primary">My Trees</a>
                <a href="/dashboard" class="btn btn-primary">Dashboard</a>
                <a href="/logout" class="btn btn-primary">Logout</a>
            </div>
        </div>
        <div class="row_3">
           <h1>{{tree.species}} planted by {{tree.planter.first_name}}</h1>
        </div>
        <div class="container2">
                <div class="row mb-3">
                    <p>Where: {{tree.location}}</p>
                </div>
                <div class="row mb-3">
                    <p>When: {{tree.date_planted}}</p>
                </div>
                <div class="row mb-3">
                    <p>Reason: {{tree.reason}}</p>
                </div>
        </div>
    </div>
</body>
</html>
