<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        .row_1{
            display: flex;
            justify-content: space-between;
        }
        .row_2{
            display: flex;
            justify-content: space-between;
        }
        .container{
            border: solid black 2px;
            padding: 10px;
        }
        .btn{
            background-color: rgb(50, 234, 50);
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="row_1">
            <h1 style="color: rgb(50, 234, 50);">Arbortrary</h1>
            <h1>Welcome, {{user.first_name}}</h1>
        </div>
        <div class="row_2">
            <p>A site to track randomly planted trees</p>
            <div class="links">
                <a href="/new/tree" class="btn btn-primary">Plant a Tree</a>
                <a href="/dashboard" class="btn btn-primary">Dashboard</a>
                <a href="/logout" class="btn btn-primary">Logout</a>
            </div>
        </div>
        <div class="row_3">
            <div class="col-4 offset-1">
                <h2>Manage My Trees</h2>
            </div>
            <table class ="table table-striped">
                <thead>
                    <tr>
                        <th>Species</th>
                        <th>Date Planted</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for tree in user_trees.trees %}
                        <tr>
                            <td>{{tree.species}}</td>
                            <td>{{tree.date_planted}}</td>
                            <td>
                                <a href="/delete">Delete</a>
                                <a href="/edit/{{tree.id}}">Edit</a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
