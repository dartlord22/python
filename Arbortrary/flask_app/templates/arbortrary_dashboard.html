<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        .row_1{
            display: flex;
            justify-content: space-between;
        }
        .row_2{
            display: flex;
            justify-content: space-between;
        }
        .container{
            border: solid black 2px;
            padding: 10px;
        }
        .btn{
            background-color: rgb(50, 234, 50);
        }
    </style>
    <title>Arbortrary Dashboard</title>
</head>
<body>
    <div class="container">
        <div class="row_1">
            <h1 style="color: rgb(50, 234, 50);">Arbortrary</h1>
            <h1>Welcome, {{user.first_name}}</h1>
        </div>
        <div class="row_2">
            <p>A site to track randomly planted trees</p>
            <div class="links">
                <a href="/user/account/{{user.id}}" class="btn btn-primary">My Trees</a>
                <a href="/new/tree" class="btn btn-primary">Plant a Tree</a>
                <a href="/logout" class="btn btn-primary">Logout</a>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">Species </th>
                    <th scope="col">Planted By</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for tree in trees %}
                    <tr>
                        <td>{{tree.species}}</td>
                        <td>{{tree.planter.first_name}}</td>
                        <td><a href="/show/{{tree.id}}">Details</a></td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    </div>
</body>
</html>
